services:
  - type: web
    name: hedge-fund-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_PATH
        value: ./hedge_fund.db
      - key: AUTO_TRADE_ENABLED
        value: "true"
      - key: AUTO_TRADE_HOUR
        value: "9"
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: STARTING_CAPITAL_CHF
        value: "100000.0"
      - key: MAX_POSITION_PCT
        value: "0.10"
      - key: CRYPTO_MAX_ALLOCATION
        value: "0.30"
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: http://localhost:3000
